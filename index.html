<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trip Planner</title>
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/editor.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
</head>
<body>

<div class="tp-settings-wrap" id="tp-settings-wrap">
  <button class="tp-settings-btn" onclick="toggleSettingsPopover()" title="Settings" id="tp-settings-btn"></button>
  <div class="tp-settings-popover hidden" id="tp-settings-popover">
    <div class="tp-settings-group">
      <span class="tp-settings-label" id="tp-lbl-theme">Theme</span>
      <div class="tp-toggle-row">
        <button class="tp-theme-btn active" data-theme="dark" onclick="setTheme('dark')">Dark</button>
        <button class="tp-theme-btn" data-theme="light" onclick="setTheme('light')">Light</button>
      </div>
    </div>
    <div class="tp-settings-group">
      <span class="tp-settings-label" id="tp-lbl-lang">Language</span>
      <div class="tp-toggle-row">
        <button class="tp-lang-btn active" data-lang="en" onclick="setLanguage('en')">EN</button>
        <button class="tp-lang-btn" data-lang="pt-BR" onclick="setLanguage('pt-BR')">PT-BR</button>
      </div>
    </div>
    <div class="tp-settings-group">
      <span class="tp-settings-label" id="tp-lbl-style">Card Style</span>
      <div class="tp-toggle-row">
        <button class="tp-style-btn active" data-style="classic" onclick="setCardStyle('classic')">Classic</button>
        <button class="tp-style-btn" data-style="bento" onclick="setCardStyle('bento')">Bento</button>
        <button class="tp-style-btn" data-style="minimal" onclick="setCardStyle('minimal')">Minimal</button>
        <button class="tp-style-btn" data-style="playful" onclick="setCardStyle('playful')">Playful</button>
      </div>
    </div>
    <div class="tp-actions-group" id="tp-actions-group">
      <span class="tp-settings-label" id="tp-lbl-actions">Actions</span>
      <div class="tp-actions-list">
        <button class="tp-action-item" id="tp-pop-docs" onclick="document.getElementById('load-docs-btn').click();toggleSettingsPopover()"></button>
        <button class="tp-action-item" id="tp-pop-edit" onclick="openEditor(false);toggleSettingsPopover()"></button>
        <button class="tp-action-item" id="tp-pop-change" onclick="document.getElementById('change-trip-btn').click();toggleSettingsPopover()"></button>
      </div>
    </div>
    <div class="tp-settings-group tp-settings-toggles" id="tp-toggles-group" style="display:none">
      <span class="tp-settings-label" id="tp-lbl-toggles">Options</span>
      <label class="tp-toggle-check">
        <input type="checkbox" id="tp-toggle-gray-past" onchange="toggleGrayPast(this.checked)">
        <span id="tp-lbl-gray-past">Gray past days</span>
      </label>
    </div>
  </div>
</div>

<div id="picker-view" class="picker-container">
  <h1 class="picker-title">Trip <em>Planner</em></h1>
  <p class="picker-subtitle">Your personal travel timeline &middot; No data uploaded to servers</p>
  <div class="picker-box" id="picker-box">
    <div class="picker-icon" id="picker-icon"></div>
    <div class="picker-label" id="picker-label">Select your trip folder</div>
    <div class="picker-hint" id="picker-hint">Contains your JSON config + documents</div>
    <input type="file" accept=".json" class="picker-input" id="file-input" aria-label="Select trip config file">
    <input type="file" webkitdirectory class="picker-input" id="file-input-dir" aria-label="Select trip folder">
  </div>
  <div class="picker-actions">
    <a id="load-sample">Load sample trip</a>
    <span class="picker-or">or</span>
    <button class="picker-new-btn" id="new-trip-btn" type="button" title="New Trip"></button>
  </div>
  <div class="picker-features" id="picker-features"></div>
</div>

<div id="trip-view" class="hidden">
  <div class="trip-actions-bar" id="trip-actions-bar">
    <button class="trip-action-btn btn-docs" id="load-docs-btn" title="Load Documents"></button>
    <button class="trip-action-btn btn-edit" id="edit-trip-btn" title="Edit Trip"></button>
    <button class="trip-action-btn btn-change" id="change-trip-btn" title="Change Trip"></button>
  </div>
  <input type="file" id="docs-input" multiple accept=".pdf,.jpg,.jpeg,.png,.webp" class="hidden-input" aria-label="Select documents">
  <div id="docs-panel" class="docs-panel hidden">
    <div class="docs-panel-header">
      <span class="docs-panel-title" id="docs-panel-title"></span>
      <button class="docs-panel-close" onclick="closeDocsPanel()">&times;</button>
    </div>
    <div class="docs-panel-actions">
      <button class="docs-action-btn" id="select-folder-btn" title="Select Folder"></button>
      <button class="docs-action-btn" id="select-files-btn" title="Select Files"></button>
    </div>
    <div class="docs-panel-list" id="docs-list"></div>
  </div>
  <div id="card-overlay"></div>
  <div id="trip-route-overlay" class="trip-route-overlay hidden">
    <div class="trip-route-header">
      <span class="trip-route-title" id="trip-route-title">Trip Route</span>
      <button class="trip-route-close" onclick="toggleTripRouteMap()">&times;</button>
    </div>
    <div id="trip-route-map" class="trip-route-map-container"></div>
  </div>
  <header id="trip-header"></header>
  <div class="legend" id="trip-legend"></div>
  <div class="timeline-controls" id="timeline-controls">
    <div class="search-bar">
      <span class="search-icon" id="search-icon-el"></span>
      <input type="text" id="timeline-search-input" class="search-input" placeholder="Search timeline…" autocomplete="off">
      <button class="search-clear hidden" id="search-clear-btn" onclick="clearTimelineSearch()" title="Clear">&times;</button>
    </div>
    <div class="view-mode-bar">
      <button class="view-mode-btn active" data-mode="all" onclick="setViewMode('all')">All</button>
      <button class="view-mode-btn" data-mode="byDay" onclick="setViewMode('byDay')">Day</button>
      <button class="view-mode-btn" data-mode="byCity" onclick="setViewMode('byCity')">City</button>
      <button class="view-mode-btn" data-mode="paged" onclick="setViewMode('paged')">Paged</button>
    </div>
  </div>
  <div id="view-page-nav" class="view-page-nav hidden">
    <button class="view-nav-btn" onclick="viewPrev()">‹</button>
    <span class="view-page-label" id="view-page-label">1 of 1</span>
    <button class="view-nav-btn" onclick="viewNext()">›</button>
  </div>
  <div class="timeline" id="timeline"></div>
  <div id="timeline-no-results" class="timeline-no-results hidden"></div>
</div>

<div id="editor-overlay" class="editor-overlay hidden">
  <div class="editor-toolbar">
    <div class="editor-toolbar-left">
      <span class="editor-toolbar-icon" id="editor-toolbar-icon"></span>
      <span class="editor-toolbar-title">Trip Editor</span>
    </div>
    <div class="editor-toolbar-right">
      <button class="editor-btn editor-btn-cancel" onclick="closeEditor()">Cancel</button>
      <button class="editor-btn editor-btn-save" onclick="saveTrip()" id="editor-save-btn" title="Save"></button>
    </div>
  </div>
  <div class="editor-body" id="editor-body"></div>
</div>

<script src="js/icons.js"></script>
<script src="js/i18n.js"></script>
<script src="js/utils.js"></script>
<script src="js/display.js"></script>
<script src="js/editor.js"></script>
<script src="js/app.js"></script>
</body>
</html>
